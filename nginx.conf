# TDEN 节点 Nginx 配置
# 部署路径：/etc/nginx/sites-available/tden

upstream tden_gateway {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;   # 替换为你的域名，如: tden.example.com

    # ── API 反向代理 ────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://tden_gateway;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        # SSE (AI 流式输出) 需要关闭缓冲
        proxy_buffering    off;
        proxy_cache        off;
    }

    location /health {
        proxy_pass http://tden_gateway;
    }

    location /uploads/ {
        proxy_pass http://tden_gateway;
        client_max_body_size 50M;
    }

    # ── Admin 后台 ──────────────────────────────────────────────────────────
    location /admin/ {
        alias /opt/tden/admin/;
        try_files $uri $uri/ /admin/index.html;
        # 缓存静态资源
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Developer Portal (Phase A2) ────────────────────────────────────────
    # 第三方开发者申请 OIDC 场景包 + SIN 审核员审批队列。
    # Third-party developers apply for OIDC scene packages + SIN reviewer queue.
    location /portal/ {
        alias /opt/tden/portal/;
        try_files $uri $uri/ /portal/index.html;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Web 前端 ─────────────────────────────────────────────────────────────
    location / {
        root /opt/tden/web;
        try_files $uri $uri/ /index.html;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── 安全头 ──────────────────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # 文件上传限制
    client_max_body_size 20M;

    # gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
}

# ── HTTPS（由 certbot 自动填充，或手动配置）─────────────────────────────────
# certbot 会自动将上面的 server 块修改为 HTTPS 并添加重定向规则
